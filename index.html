<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Editor</title>
  <meta name="description" content="A modern photo editor with crop, rotate, and color adjustment features">
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <h1>Photo Editor</h1>
      <p class="app-subtitle">Edit your photos with ease</p>
    </header>

    <section class="upload-section">
      <label for="imageLoader" class="file-upload-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
          <circle cx="12" cy="13" r="3"></circle>
        </svg>
        Choose Image
      </label>
      <input type="file" id="imageLoader" accept="image/*" aria-label="Upload image file">
    </section>

    <div id="editor-container" class="editor-container">
      <div class="canvas-wrapper">
        <canvas id="imageCanvas" width="600" height="400" aria-label="Image editing canvas"></canvas>
        <div id="crop-overlay" class="crop-overlay" aria-hidden="true"></div>
      </div>
      
      <div class="controls-panel">
        <div class="ai-controls">
          <h3>AI Comic Book</h3>
          <div class="ai-settings">
            <div class="bubble-field">
              <label for="geminiApiKey" class="bubble-label">Gemini API Key</label>
              <input type="password" id="geminiApiKey" class="bubble-input" placeholder="AIza..." aria-label="Gemini API Key" autocomplete="off">
            </div>
            <p class="ai-key-note">Your key is used directly in your browser and never stored or sent to any server other than Google.</p>
            <div class="bubble-field">
              <label for="aiComicPrompt" class="bubble-label">Prompt</label>
              <textarea id="aiComicPrompt" class="bubble-input ai-prompt-input" rows="4" aria-label="AI Comic prompt">Transform this photo into a high-quality comic book illustration. Use bold black ink outlines, flat cel-shaded colors, halftone dot shading in shadow areas, and a classic American comic book art style. Preserve the composition and subjects of the original image.</textarea>
            </div>
            <button id="aiComicBtn" class="tool-btn ai-comic-btn" type="button" disabled aria-label="Apply AI comic book effect">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"></polygon>
              </svg>
              AI Comic Book
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="app-footer">
      <div id="version-label" class="version-label">Photo Editor v2.0.0</div>
      <div id="status-message" class="status-message" aria-live="polite"></div>
    </footer>

    <div id="ai-progress-overlay" class="ai-progress-overlay" aria-hidden="true" style="display:none">
      <div class="ai-progress-box">
        <div class="ai-spinner"></div>
        <p class="ai-progress-label">Generating AI comic...</p>
      </div>
    </div>
  </main>

  <details id="ai-result-details" class="collapsible-section">
    <summary class="collapsible-summary">🎨 AI Comic Book Result</summary>
    <section id="ai-result-section" class="ai-result-section" aria-label="AI Comic Book Result">
      <div class="ai-result-header">
        <button id="ai-result-save-btn" class="tool-btn primary" type="button">Save AI Result</button>
      </div>
      <div class="ai-result-viewer">
        <img id="ai-result-img" class="ai-result-img" src="" alt="AI Comic Book Result">
      </div>
    </section>
  </details>

  <details class="collapsible-section">
    <summary class="collapsible-summary">🐛 Debug Console</summary>
    <section class="debug-terminal" aria-label="Debug terminal">
      <div class="debug-terminal__header">
        <span class="debug-terminal__title">Debug Console</span>
        <button id="debug-terminal-clear" class="debug-terminal__clear" type="button">Clear</button>
      </div>
      <div id="debug-terminal-output" class="debug-terminal__output" role="log" aria-live="polite"></div>
    </section>
  </details>

  <!-- Debug terminal: intercept errors before module scripts load -->
  <script>
    (function () {
      var MAX_LINES = 100;

      function pad(n) { return String(n).padStart(2, '0'); }

      function timestamp() {
        var d = new Date();
        return '[' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) + ']';
      }

      function addLine(level, msg) {
        var el = document.getElementById('debug-terminal-output');
        if (!el) return;
        var line = document.createElement('div');
        line.className = 'debug-line debug-line--' + level.toLowerCase();
        line.textContent = timestamp() + ' [' + level + '] ' + msg;
        el.appendChild(line);
        // Keep last MAX_LINES entries
        while (el.children.length > MAX_LINES) {
          el.removeChild(el.firstChild);
        }
        el.scrollTop = el.scrollHeight;
      }

      // Intercept console.error
      var _error = console.error.bind(console);
      console.error = function () {
        _error.apply(console, arguments);
        addLine('ERROR', Array.prototype.join.call(arguments, ' '));
      };

      // Intercept console.warn
      var _warn = console.warn.bind(console);
      console.warn = function () {
        _warn.apply(console, arguments);
        addLine('WARN', Array.prototype.join.call(arguments, ' '));
      };

      // Intercept console.log
      var _log = console.log.bind(console);
      console.log = function () {
        _log.apply(console, arguments);
        addLine('LOG', Array.prototype.join.call(arguments, ' '));
      };

      window.addEventListener('error', function (e) {
        addLine('ERROR', (e.message || String(e)) + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : ''));
      });

      window.addEventListener('unhandledrejection', function (e) {
        var reason = e.reason;
        addLine('ERROR', 'Unhandled rejection: ' + (reason && reason.message ? reason.message : String(reason)));
      });

      document.addEventListener('DOMContentLoaded', function () {
        var clearBtn = document.getElementById('debug-terminal-clear');
        if (clearBtn) {
          clearBtn.addEventListener('click', function () {
            var output = document.getElementById('debug-terminal-output');
            if (output) output.innerHTML = '';
          });
        }
      });
    })();
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
