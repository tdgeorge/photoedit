<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Editor</title>
  <meta name="description" content="A modern photo editor with crop, rotate, and color adjustment features">
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <main class="app-container">
    <header class="app-header">
      <h1>Photo Editor</h1>
      <p class="app-subtitle">Edit your photos with ease</p>
    </header>

    <section class="upload-section">
      <label for="imageLoader" class="file-upload-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
          <circle cx="12" cy="13" r="3"></circle>
        </svg>
        Choose Image
      </label>
      <input type="file" id="imageLoader" accept="image/*" aria-label="Upload image file">
    </section>

    <div id="editor-container" class="editor-container">
      <div class="canvas-wrapper">
        <canvas id="imageCanvas" width="600" height="400" aria-label="Image editing canvas"></canvas>
        <div id="crop-overlay" class="crop-overlay" aria-hidden="true"></div>
      </div>
      
      <div class="controls-panel">
        <div class="toolbar">
          <button id="rotateBtn" class="tool-btn" type="button" aria-label="Rotate image 90 degrees">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6"></path>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
            Rotate 90°
          </button>
          <button id="cropBtn" class="tool-btn" type="button" aria-label="Crop image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"></path>
              <path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"></path>
            </svg>
            Crop
          </button>
          <button id="resetBtn" class="tool-btn secondary" type="button" aria-label="Reset all changes">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
            Reset
          </button>
          <button id="saveBtn" class="tool-btn primary" type="button" aria-label="Save edited image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17,21 17,13 7,13 7,21"></polyline>
              <polyline points="7,3 7,8 15,8"></polyline>
            </svg>
            Save
          </button>
          <button id="fftBtn" disabled>🔬 FFT Analysis</button>
          <button id="comicBtn" class="tool-btn" type="button" disabled aria-label="Apply comic-style effect to image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
              <line x1="9" y1="9" x2="9.01" y2="9"></line>
              <line x1="15" y1="9" x2="15.01" y2="9"></line>
            </svg>
            Apply Comic Effect
          </button>
          <button id="bubbleBtn" class="tool-btn" type="button" disabled aria-label="Add speech bubble to image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Add Speech Bubble
          </button>
          <button id="clearBubblesBtn" class="tool-btn" type="button" aria-label="Clear all speech bubbles">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3,6 5,6 21,6"></polyline>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
            </svg>
            Clear Bubbles
          </button>
        </div>

        <div class="color-controls">
          <h3>Color Adjustments</h3>
          <div class="slider-group">
            <label for="redSlider" class="slider-label">
              <span class="color-name">Red</span>
              <span id="redValue" class="slider-value">100</span>
            </label>
            <input type="range" id="redSlider" class="color-slider red" min="0" max="200" value="100" aria-valuemin="0" aria-valuemax="200" aria-valuenow="100">
          </div>
          
          <div class="slider-group">
            <label for="greenSlider" class="slider-label">
              <span class="color-name">Green</span>
              <span id="greenValue" class="slider-value">100</span>
            </label>
            <input type="range" id="greenSlider" class="color-slider green" min="0" max="200" value="100" aria-valuemin="0" aria-valuemax="200" aria-valuenow="100">
          </div>
          
          <div class="slider-group">
            <label for="blueSlider" class="slider-label">
              <span class="color-name">Blue</span>
              <span id="blueValue" class="slider-value">100</span>
            </label>
            <input type="range" id="blueSlider" class="color-slider blue" min="0" max="200" value="100" aria-valuemin="0" aria-valuemax="200" aria-valuenow="100">
          </div>
        </div>

        <div class="bubble-controls">
          <h3>Speech Bubble</h3>
          <div class="bubble-settings">
            <div class="bubble-field">
              <label for="bubbleText" class="bubble-label">Text</label>
              <input type="text" id="bubbleText" class="bubble-input" value="Hello!" maxlength="60" aria-label="Speech bubble text">
            </div>
            <div class="bubble-field bubble-field--row">
              <label for="bubbleFontSize" class="bubble-label">Font size</label>
              <input type="number" id="bubbleFontSize" class="bubble-input bubble-input--small" value="18" min="8" max="72" aria-label="Speech bubble font size">
            </div>
            <div class="bubble-field bubble-field--row">
              <label for="bubbleColor" class="bubble-label">Text color</label>
              <input type="color" id="bubbleColor" value="#000000" aria-label="Speech bubble text color">
            </div>
          </div>
        </div>

        <div class="ai-controls">
          <h3>AI Comic Book</h3>
          <div class="ai-settings">
            <div class="bubble-field">
              <label for="openaiApiKey" class="bubble-label">OpenAI API Key</label>
              <input type="password" id="openaiApiKey" class="bubble-input" placeholder="sk-..." aria-label="OpenAI API Key" autocomplete="off">
            </div>
            <p class="ai-key-note">Your key is used directly in your browser and never stored or sent to any server other than OpenAI.</p>
            <div class="bubble-field">
              <label for="aiComicPrompt" class="bubble-label">Prompt</label>
              <textarea id="aiComicPrompt" class="bubble-input ai-prompt-input" rows="4" aria-label="AI Comic prompt">Transform this photo into a high-quality comic book illustration. Use bold black ink outlines, flat cel-shaded colors, halftone dot shading in shadow areas, and a classic American comic book art style. Preserve the composition and subjects of the original image.</textarea>
            </div>
            <button id="aiComicBtn" class="tool-btn ai-comic-btn" type="button" disabled aria-label="Apply AI comic book effect">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"></polygon>
              </svg>
              AI Comic Book
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="app-footer">
      <div id="version-label" class="version-label">Photo Editor v2.0.0</div>
      <div id="status-message" class="status-message" aria-live="polite"></div>
    </footer>

    <div id="ai-progress-overlay" class="ai-progress-overlay" aria-hidden="true" style="display:none">
      <div class="ai-progress-box">
        <div class="ai-spinner"></div>
        <p class="ai-progress-label">Generating AI comic...</p>
      </div>
    </div>
  </main>

  <section id="ai-result-section" class="ai-result-section" style="display:none" aria-label="AI Comic Book Result">
    <div class="ai-result-header">
      <h2 class="ai-result-title">🎨 AI Comic Book Result</h2>
      <button id="ai-result-save-btn" class="tool-btn primary" type="button">Save AI Result</button>
    </div>
    <div class="ai-result-viewer">
      <img id="ai-result-img" class="ai-result-img" src="" alt="AI Comic Book Result">
    </div>
  </section>

  <section class="debug-terminal" aria-label="Debug terminal">
    <div class="debug-terminal__header">
      <span class="debug-terminal__title">Debug Console</span>
      <button id="debug-terminal-clear" class="debug-terminal__clear" type="button">Clear</button>
    </div>
    <div id="debug-terminal-output" class="debug-terminal__output" role="log" aria-live="polite"></div>
  </section>

  <!-- Debug terminal: intercept errors before module scripts load -->
  <script>
    (function () {
      var MAX_LINES = 100;

      function pad(n) { return String(n).padStart(2, '0'); }

      function timestamp() {
        var d = new Date();
        return '[' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) + ']';
      }

      function addLine(level, msg) {
        var el = document.getElementById('debug-terminal-output');
        if (!el) return;
        var line = document.createElement('div');
        line.className = 'debug-line debug-line--' + level.toLowerCase();
        line.textContent = timestamp() + ' [' + level + '] ' + msg;
        el.appendChild(line);
        // Keep last MAX_LINES entries
        while (el.children.length > MAX_LINES) {
          el.removeChild(el.firstChild);
        }
        el.scrollTop = el.scrollHeight;
      }

      // Intercept console.error
      var _error = console.error.bind(console);
      console.error = function () {
        _error.apply(console, arguments);
        addLine('ERROR', Array.prototype.join.call(arguments, ' '));
      };

      // Intercept console.warn
      var _warn = console.warn.bind(console);
      console.warn = function () {
        _warn.apply(console, arguments);
        addLine('WARN', Array.prototype.join.call(arguments, ' '));
      };

      // Intercept console.log
      var _log = console.log.bind(console);
      console.log = function () {
        _log.apply(console, arguments);
        addLine('LOG', Array.prototype.join.call(arguments, ' '));
      };

      window.addEventListener('error', function (e) {
        addLine('ERROR', (e.message || String(e)) + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : ''));
      });

      window.addEventListener('unhandledrejection', function (e) {
        var reason = e.reason;
        addLine('ERROR', 'Unhandled rejection: ' + (reason && reason.message ? reason.message : String(reason)));
      });

      document.addEventListener('DOMContentLoaded', function () {
        var clearBtn = document.getElementById('debug-terminal-clear');
        if (clearBtn) {
          clearBtn.addEventListener('click', function () {
            var output = document.getElementById('debug-terminal-output');
            if (output) output.innerHTML = '';
          });
        }
      });
    })();
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
